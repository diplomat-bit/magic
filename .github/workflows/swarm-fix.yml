name: Autonomous Gemini Code Alignment by james burvel ocallaghan iii

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual ignition"
        required: false
        default: "Distributed Model Base Optimization Swarm"

permissions:
  contents: write  # Crucial: Grants write authorization to let the node script push inline commits

jobs:
  autonomous-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pulls full history so inline pushes match up cleanly without tracking conflicts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Swarm Model Rotations
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/fix-code.js
