name: Verification Swarm

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for triggering verification"
        required: false
        default: "Autonomous Code Modification & Alignment"

permissions:
  contents: write
  actions: write
  checks: write

jobs:
  verify:
    name: Codebase Verification
    runs-on: ubuntu-latest
    # This prevents the Node 20 deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Environment Variables
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
        run: |
          echo "==== VERIFYING REQUIRED ENVIRONMENT VARIABLES ===="
          if [ -z "$STRIPE_SECRET_KEY" ]; then echo "Error: STRIPE_SECRET_KEY is missing."; exit 1; fi
          if [ -z "$STRIPE_PRICE_ID" ]; then echo "Error: STRIPE_PRICE_ID is missing."; exit 1; fi
          echo "Environment verification complete."

      - name: Production Build Compilation
        run: |
          echo "==== RUNNING COMPILATION AND BUILD ===="
          npm run build --if-present
