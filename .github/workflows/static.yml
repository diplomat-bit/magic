# .github/workflows/verify-code.yml
name: Verification Swarm

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for triggering verification"
        required: false
        default: "Autonomous Code Modification & Alignment"

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  verify:
    name: Codebase Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Type Compliance Checks
        run: |
          echo "==== RUNNING TYPESCRIPT COMPLIANCE ===="
          # If you have a lint script, run it. 
          # If you want to check types every time, separate them into two lines or use &&
          if npm run | grep -q "lint"; then npm run lint; fi
          npx tsc --noEmit

      - name: Production Build Compilation
        run: |
          echo "==== RUNNING COMPILATION AND BUILD ===="
          npm run build
          
