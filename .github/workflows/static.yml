name: Verification Swarm

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for triggering verification"
        required: false
        default: "Autonomous Code Modification & Alignment"

permissions:
  contents: write
  actions: write
  checks: write

jobs:
  verify:
    name: Codebase Verification
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Environment Variables
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
        run: |
          echo "==== VERIFYING REQUIRED ENVIRONMENT VARIABLES ===="
          if [ -z "$STRIPE_SECRET_KEY" ]; then echo "Error: STRIPE_SECRET_KEY is missing."; exit 1; fi
          if [ -z "$STRIPE_PRICE_ID" ]; then echo "Error: STRIPE_PRICE_ID is missing."; exit 1; fi
          echo "Environment verification complete."

      - name: Production Build Compilation & Autonomous Self-Healing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "==== RUNNING COMPILATION AND BUILD WITH SELF-HEALING ===="
          
          MAX_ATTEMPTS=5
          ATTEMPT=1
          BUILD_SUCCESS=false

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Build attempt #$ATTEMPT..."
            
            # Run the build and pipe both stdout and stderr to a log file
            npm run build --if-present > build.log 2>&1
            BUILD_STATUS=$?
            
            # Print log to console for visibility
            cat build.log

            if [ $BUILD_STATUS -eq 0 ]; then
              echo "Build succeeded on attempt #$ATTEMPT!"
              BUILD_SUCCESS=true
              break
            fi

            echo "Build failed. Invoking Gemini API to repair missing modules or references..."
            
            if [ -z "$GEMINI_API_KEY" ]; then
              echo "Error: GEMINI_API_KEY secret is missing. Cannot repair build automatically."
              exit 1
            fi

            # Read the build log errors to feed into the prompt
            ERROR_LOG=$(tail -n 30 build.log)

            # Use a secure inline script to call the Gemini API
            # It instructs Gemini to parse the missing import/file path and respond ONLY with the file content or fix.
            REPAIR_DATA=$(node -e '
            const apiKey = process.env.GEMINI_API_KEY;
            const errorLog = process.env.ERROR_LOG;
            
            const prompt = `You are an automated code healing pipeline. The project compilation just failed with this error:
            ---
            ${errorLog}
            ---
            Analyze the error. If a file is missing (e.g., "Could not resolve ./Typography from components/AccountDetails.tsx"), generate the valid code/component that satisfies that missing module. Use a generic wrapper or placeholder matching the name if you do not know the exact code (e.g. export standard React component or export layout).
            
            Provide your response strictly in the following JSON format so the runner can write it to disk:
            {
              "filePath": "components/Typography.tsx",
              "content": "export const Typography = ({ children }: { children: React.ReactNode }) => <span>{children}</span>;\\nexport default Typography;"
            }
            Return ONLY the valid raw JSON object. No markdown blocks, no formatting wrapper characters.`;

            fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            })
            .then(res => res.json())
            .then(data => {
              const reply = data.candidates[0].content.parts[0].text.trim().replace(/^```json/, "").replace(/```$/, "").trim();
              console.log(reply);
            })
            .catch(err => {
              console.error(JSON.stringify({ error: true, message: err.message }));
              process.exit(1);
            });
            ' 2>/dev/null)

            # Parse and write the generated file to disk
            if echo "$REPAIR_DATA" | grep -q "filePath"; then
              TARGET_FILE=$(echo "$REPAIR_DATA" | node -e "const fs = require('fs'); const data = JSON.parse(process.stdin.read()); console.log(data.filePath);")
              FILE_CONTENT=$(echo "$REPAIR_DATA" | node -e "const fs = require('fs'); const data = JSON.parse(process.stdin.read()); console.log(data.content);")
              
              mkdir -p "$(dirname "$TARGET_FILE")"
              echo "$FILE_CONTENT" > "$TARGET_FILE"
              echo "Successfully generated missing asset: $TARGET_FILE"
            else
              echo "Gemini could not identify or parse the resolution block. Stopping self-healing loop."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$BUILD_SUCCESS" = false ]; then
            echo "Build failed to heal itself after $MAX_ATTEMPTS attempts."
            exit 1
          fi
