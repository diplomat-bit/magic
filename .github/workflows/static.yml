# .github/workflows/verify-code.yml
name: Verification Swarm

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for triggering verification"
        required: false
        default: "Autonomous Code Modification & Alignment"

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  verify:
    name: Codebase Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify Environment Variables
        run: |
          echo "==== VERIFYING REQUIRED ENVIRONMENT VARIABLES ===="
          # Add required environment variables here, e.g., if [ -z "$REQUIRED_VAR" ]; then exit 1; fi
          # This ensures the build process does not fail silently due to missing configuration.
          echo "Environment verification complete."

      - name: Type Compliance Checks
        run: |
          echo "==== RUNNING TYPESCRIPT COMPLIANCE ===="
          if npm run | grep -q "lint"; then npm run lint; fi
          npx tsc --noEmit --project tsconfig.json

      - name: Production Build Compilation
        run: |
          echo "==== RUNNING COMPILATION AND BUILD ===="
          npm run build --if-present